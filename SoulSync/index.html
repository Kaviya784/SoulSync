<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoulSync</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR -->
    <header class="navbar">
        <div class="logo">
            <i class="fa-solid fa-music"></i>
            <!-- <img src="./assests/—Pngtree—music logo design and icon_4169799.png"> -->
            SOULSYNC
        </div>
        <nav>
            <a href="#">Home</a>
            <a href="#">Moods</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- MAIN SECTION -->
    <section class="hero">
        <h1 class="hero-title">Mood Based Music & Quote Recommender</h1>
        <p class="hero-sub">Choose a mood and explore your personalized vibe</p>
    </section>

    <!-- MOOD GRID -->
    <section class="mood-section">
        <h2 class="section-title">Select Your Mood</h2>

        <div class="mood-grid">

            <div class="mood-card happy">
                <p> Happy</p>
            </div>

            <div class="mood-card sad">
                <p> Sad</p>
            </div>

            <div class="mood-card stressed">
                <p> Stressed</p>
            </div>

            <div class="mood-card calm">
                <p> Calm</p>
            </div>

        </div>
    </section>

    <!-- RECOMMENDATION BOX -->
    <section class="output-section">
        <div class="output-box">
            <h2>Recommendation</h2>
            <p class="song"> Song suggestion will appear here</p>
            <p class="quote"> Quote will appear here</p>
        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        <p>Made with Love for Soul</p>
    </footer>

</body>
</html>
